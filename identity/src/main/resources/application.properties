# ========================
# Resilience4j RateLimiter
# ========================

# Configuración de Resilience4j Rate Limiters
# Habilitar Resilience4j
management.endpoint.health.show-details=always
management.health.ratelimiters.enabled=true

# Límite para autenticación (10 intentos por minuto)
resilience4j.ratelimiter.instances.authenticationLimit.limit-for-period=10
resilience4j.ratelimiter.instances.authenticationLimit.limit-refresh-period=1m
resilience4j.ratelimiter.instances.authenticationLimit.timeout-duration=0
resilience4j.ratelimiter.instances.authenticationLimit.allow-health-indicator=true

# Límite para operaciones con cuenta (3 intentos por 5 minutos)
resilience4j.ratelimiter.instances.accountOperationsLimit.limit-for-period=3
resilience4j.ratelimiter.instances.accountOperationsLimit.limit-refresh-period=5m
resilience4j.ratelimiter.instances.accountOperationsLimit.timeout-duration=0
resilience4j.ratelimiter.instances.accountOperationsLimit.allow-health-indicator=true

# Límite para cambios de contraseña (5 intentos por 10 minutos)
resilience4j.ratelimiter.instances.passwordChangeLimit.limit-for-period=5
resilience4j.ratelimiter.instances.passwordChangeLimit.limit-refresh-period=10m
resilience4j.ratelimiter.instances.passwordChangeLimit.timeout-duration=0
resilience4j.ratelimiter.instances.passwordChangeLimit.allow-health-indicator=true

# Límite para recuperación de contraseñas (3 intentos por 10 minutos)
resilience4j.ratelimiter.instances.passwordRecoveryLimit.limit-for-period=3
resilience4j.ratelimiter.instances.passwordRecoveryLimit.limit-refresh-period=10m
resilience4j.ratelimiter.instances.passwordRecoveryLimit.timeout-duration=0
resilience4j.ratelimiter.instances.passwordRecoveryLimit.allow-health-indicator=true

# Límite para registros (5 intentos por hora)
resilience4j.ratelimiter.instances.registrationLimit.limit-for-period=5
resilience4j.ratelimiter.instances.registrationLimit.limit-refresh-period=1h
resilience4j.ratelimiter.instances.registrationLimit.timeout-duration=0
resilience4j.ratelimiter.instances.registrationLimit.allow-health-indicator=true

# Límite para verificación de email (20 intentos por minuto)
resilience4j.ratelimiter.instances.emailCheckLimit.limit-for-period=20
resilience4j.ratelimiter.instances.emailCheckLimit.limit-refresh-period=1m
resilience4j.ratelimiter.instances.emailCheckLimit.timeout-duration=0
resilience4j.ratelimiter.instances.emailCheckLimit.allow-health-indicator=true

# Mantener compatibilidad con el rate limiter existente
resilience4j.ratelimiter.instances.emailRateLimit.limit-for-period=10
resilience4j.ratelimiter.instances.emailRateLimit.limit-refresh-period=1m
resilience4j.ratelimiter.instances.emailRateLimit.timeout-duration=0