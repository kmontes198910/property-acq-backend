spring.application.name=wa-messaging
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/wamessaging
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=wa-messaging-group
spring.kafka.consumer.auto-offset-reset=earliest

# WhatsApp API Configuration
whatsapp.api.url=https://graph.facebook.com/v17.0
whatsapp.api.phone-number-id=your-phone-number-id
whatsapp.api.token=your-whatsapp-api-token
whatsapp.api.version=v17.0

# Thread Pool Configuration for Concurrent Message Processing
wa.messaging.thread.core-pool-size=10
wa.messaging.thread.max-pool-size=50
wa.messaging.thread.queue-capacity=500
wa.messaging.thread.name-prefix=wa-message-processor-

# Kafka Topics
kafka.topic.message-send=wa-message-send
kafka.topic.message-status=wa-message-status
