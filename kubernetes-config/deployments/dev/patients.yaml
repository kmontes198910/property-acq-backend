apiVersion: apps/v1
kind: Deployment
metadata:
  name: patients
  namespace: medinec
spec:
  replicas: 1
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: apps.deployment-medinec-patients
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: patients
        workload.user.cattle.io/workloadselector: apps.deployment-medinec-patients
    spec:
      containers:
        - name: patients
          image: kmontes2020/medinec-patients:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 9909
              protocol: TCP
          envFrom:
            - secretRef:
                name: patients-secret
      imagePullSecrets:
        - name: dokcer-hub
      restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: patients-service
  namespace: medinec
spec:
  selector:
    app: patients
  ports:
    - protocol: TCP
      port: 80           # Puerto externo expuesto por el servicio
      targetPort: 9909   # Puerto donde está escuchando el contenedor
  type: ClusterIP        # Tipo de servicio (puedes cambiar a NodePort o LoadBalancer si es necesario)