apiVersion: apps/v1
kind: Deployment
metadata:
  name: patients
  namespace: medinec-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patients
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: patients
    spec:
      containers:
        - name: patients
          image: kmontes2020/medinec-patients-dev:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 9909
              protocol: TCP
          envFrom:
            - secretRef:
                name: patients-secret
      imagePullSecrets:
        - name: docker-hub
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: patients-service
  namespace: medinec-dev
spec:
  selector:
    app: patients
  ports:
    - protocol: TCP
      port: 9909
      targetPort: 9909
  type: ClusterIP