apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbridges
  namespace: medinec-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbridges
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: cloudbridges
    spec:
      containers:
        - name: cloudbridges
          image: kmontes2020/medinec-cloud-bridges-dev:v1
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: cloudbridges-secret
      imagePullSecrets:
        - name: docker-hub  # Corrección de nombre (antes tenía un error tipográfico)
      restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: cloudbridges-service-dev
  namespace: medinec-dev
spec:
  ports:
    - protocol: TCP
      port: 9909
      targetPort: 9909
  selector:
    app: cloudbridges
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster