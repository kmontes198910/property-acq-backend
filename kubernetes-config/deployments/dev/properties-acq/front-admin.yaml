apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-acq-dev-client
  namespace: property-acq-dev
  labels:
    app: property-acq-dev-client
spec:
  replicas: 2                       # Alta disponibilidad
  selector:
    matchLabels:
      app: property-acq-dev-client  # Debe coincidir con template.labels
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: property-acq-dev-client
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: property-acq-dev-client
          image: kmontes2020/property-acq-client-dev:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: AUTH_ORIGIN
              value: "https://property-acq-dev.kynsoft.net"
            - name: VITE_APP_BASE_URL
              value: "http://gateway-service:8080"
            - name: NUXT_PUBLIC_SOCKET_URL
              value: "https://socket-property-acq-dev.kynsoft.net/ws"
            # Secretos
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: property-acq-secrets
                  key: AUTH_SECRET
            - name: VITE_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: property-acq-secrets
                  key: VITE_APP_CLIENT_ID
            - name: VITE_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: property-acq-secrets
                  key: VITE_APP_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      imagePullSecrets:
        - name: docker-hub
---

apiVersion: v1
kind: Service
metadata:
  name: property-acq-dev-client
  namespace: property-acq-dev
spec:
  type: ClusterIP
  selector:
    app: property-acq-dev-client
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP