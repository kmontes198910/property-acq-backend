apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongo-cleaner
  namespace: medinec-dev
spec:
  schedule: "*/1 * * * *"  # cada 1 minuto
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: mongo-cleaner
        spec:
          containers:
            - name: mongo-cleaner
              image: kmontes2020/medinec-mongo-cleaner-dev:v1
              imagePullPolicy: Always
              env:
                - name: MONGO_CONNECTION_STRING
                  valueFrom:
                    secretKeyRef:
                      name: mongo-cleaner-secret
                      key: connection-string
                - name: MONGO_DATABASE_NAME
                  valueFrom:
                    secretKeyRef:
                      name: mongo-cleaner-secret
                      key: database-name
          imagePullSecrets:
            - name: dokcer-hub
          restartPolicy: Never
