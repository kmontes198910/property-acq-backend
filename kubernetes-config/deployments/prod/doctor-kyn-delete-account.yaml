apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-kyn-delete-account
  namespace: medinec
  labels:
    workload.user.cattle.io/workloadselector: apps.deployment-doctor-kyn-delete-account
spec:
  replicas: 1
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: apps.deployment-doctor-kyn-delete-account
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 50%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: doctor-kyn-delete-account
        workload.user.cattle.io/workloadselector: apps.deployment-doctor-kyn-delete-account
    spec:
      containers:
        - name: doctor-kyn-delete-account
          image: kmontes2020/medinec-doctor-kyn-delete-account:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: VITE_APP_BASE_URL
              value: http://gateway-service:8080
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      imagePullSecrets:
        - name: docker-hub