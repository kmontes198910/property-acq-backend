apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry-ingress
  namespace: medinec-dev
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - doctorkyn-registry-dev.kynsoft.net
      secretName: medinec-tls-dev
  rules:
    - host: doctorkyn-registry-dev.kynsoft.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry-service
                port:
                  number: 8671