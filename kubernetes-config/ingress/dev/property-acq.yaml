apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: property-acq-dev-client
  namespace: property-acq-dev
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: property-acq-dev-client
      port:
        number: 3000
  tls:
    - hosts:
        - property-acq.kynsoft.net
      secretName: property-acq-dev-tls
  rules:
    - host: property-acq.kynsoft.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: property-acq-dev-client
                port:
                  number: 3000