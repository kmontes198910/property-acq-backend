apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-app-client
  namespace: medinec
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - payment.doctorkyn.com
      secretName: kynsoft-medinec-tls
  rules:
    - host: payment.doctorkyn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payment-app-client
                port:
                  number: 3000