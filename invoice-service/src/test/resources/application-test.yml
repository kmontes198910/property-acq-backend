spring:
  datasource:
    read:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:mem:readdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password: password
    write:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:mem:writedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always

encryption:
  secret-key: TestSecretKeyForUnitTestingPurposes01
  salt: 0123456789abcdef
