name: ci-mongo-cleaner-dev

env:
  SERVICE_NAME: 'mongo-cleaner'
  SERVICE_PATH: 'jobs/mongo-cleaner'

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths:
      - ci-mongo-cleaner-dev.yml
      - 'jobs/mongo-cleaner/**'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📅 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: 🛣 Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: kmontes2020/medinec-mongo-cleaner-dev:v1

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: 📅 Checkout
        uses: actions/checkout@v4

      - name: 🛁 Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved

      - name: 🔌 Connect to VPN
        uses: kota65535/github-openvpn-connect-action@v3
        with:
          config_file: vpnconfig/cicd-kynsoft-config.ovpn
          username: cicd
          password: cicd.password12.

      - name: Enable kubectl
        uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: 🚀 Apply updated CronJob
        run: |
          kubectl -n ${{ vars.K8S_NAMESPACE_DEV }} apply -f kubernetes-config/deployments/dev/mongo-cleaner-job-deployment.yaml
