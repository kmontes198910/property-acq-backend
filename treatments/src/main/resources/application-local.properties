spring.application.name=treatments
server.port=9906

# Forzar explícitamente el modo servlet
spring.main.web-application-type=SERVLET

# Configuración de base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/kynsoft_treatments
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Configuración de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Deshabilitar configuración del servidor de configuración para ejecutar localmente
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8081